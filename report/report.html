    <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Табель учета времени</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f9f9f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .upload-section { margin-bottom: 20px; padding: 20px; border: 2px dashed #007bff; background: #fff; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <!-- Ссылка ведет на один уровень вверх, в корень к главной странице -->
    <a href="../index.html">⬅ На главную страницу</a>
    <h2>Табель учета рабочего времени (Импорт из Excel)</h2>

    <div class="upload-section">
        <h3>Выберите файл Excel (.xlsx) для загрузки</h3>
        <form id="excelForm">
            <input type="file" id="excelFile" accept=".xlsx, .xls" required>
            <button type="submit">Загрузить в систему</button>
        </form>
    </div>

    <h3>Данные из таблицы:</h3>
    <table>
        <thead>
            <tr id="tableHead"></tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="100%">Таблица пуста. Загрузите файл Excel.</td></tr>
        </tbody>
    </table>

    <script>
        const form = document.getElementById('excelForm');
        const tHead = document.getElementById('tableHead');
        const tBody = document.getElementById('tableBody');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('excelFile');
            const formData = new FormData();
            
            // ВАЖНО: имя 'excelFile' должно строго совпадать с upload.single('excelFile') на сервере!
            formData.append('excelFile', fileInput.files[0]);

            tBody.innerHTML = '<tr><td colspan="100%">Обработка файла сервером...</td></tr>';

            try {
                // Запрос летит на ваш работающий бэкенд в интернет
                const response = await fetch('https://structum.onrender.com/api/users', {
                    method: 'POST',
                    body: formData // Передаем FormData с файлом
                });

                const result = await response.json();

                if (response.ok && result.data && result.data.length > 0) {
                    renderExcelTable(result.data);
                } else {
                    tBody.innerHTML = '<tr><td colspan="100%">Ошибка: Не удалось прочитать данные. Проверьте формат файла.</td></tr>';
                }
            } catch (error) {
                console.error(error);
                tBody.innerHTML = '<tr><td colspan="100%">Ошибка подключения к бэкенду.</td></tr>';
            }
        });

        // Функция отрисовки таблицы на основе полученного JSON от сервера
        function renderExcelTable(data) {
            tHead.innerHTML = '';
            tBody.innerHTML = '';

            // Извлекаем имена колонок из ключей первого объекта таблицы
            const columns = Object.keys(data[0]);
            
            // Заполняем шапку таблицы
            columns.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col;
                tHead.appendChild(th);
            });

            // Заполняем строки данными
            data.forEach(row => {
                const tr = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = row[col] !== undefined ? row[col] : '—';
                    tr.appendChild(td);
                });
                tBody.appendChild(tr);
            });
        }
    </script>
</body>
</html>

</body>
