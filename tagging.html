<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <a href="index.html"><p>STRUCTUM</p><p>облік персоналу</p></a>
    </header>
    <body>
         <h1>ТАБЕЛЮВАННЯ</h1>

    <script src="./js/qrCodeScaner.js"></script>
     <div style="text-align: center;">

        <div id="reader" style="width: 500px;"></div>
        <div id="show" style="display: none;">
            <h4>Scanned Result</h4>
            <p style="color: blue;" id="result"></p>
        </div>
    </div>
 <script>

    const html5Qrcode = new Html5Qrcode('reader');
    
    // Функция отправки отметки на сервер
    async function sendAttendance(userId) {
        try {
            // 🌟 АВТОМАТИЧЕСКИ ДОСТАЕМ ОБЪЕКТ БРИГАДИРА ИЗ ПАМЯТИ БРАУЗЕРА
            const currentObject = localStorage.getItem('objectName');
            
            // Если объект не привязан, прерываем отправку и предупреждаем пользователя
            if (!currentObject) {
                const resultElement = document.getElementById('result');
                document.getElementById('show').style.display = 'block';
                resultElement.style.color = 'orange';
                resultElement.textContent = '⚠️ Ошибка: Вы не вошли в аккаунт или за вами не закреплен объект!';
                return;
            }

            // Отправляем ID сотрудника и название объекта на бэкенд
            const response = await fetch('https://structum.onrender.com/api/attendance/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userId: userId,
                    objectName: currentObject // 🌟 Объект автоматически подставился в тело запроса
                })
            });

            const data = await response.json();
            const resultElement = document.getElementById('result');
            document.getElementById('show').style.display = 'block';

            if (response.ok) {
                resultElement.style.color = 'green';
                resultElement.textContent = `✅ ${data.message}`;
            } else {
                resultElement.style.color = 'red';
                resultElement.textContent = `⚠️ ${data.message}`;
            }
        } catch (error) {
            console.error(error);
            alert('Ошибка подключения к серверу отметок');
        }
    }

    const qrCodeSuccessCallback = async (decodedText, decodedResult) => {
        if (decodedText) {
            // 1. Временно останавливаем камеру, чтобы она не сканировала один код много раз
            await html5Qrcode.stop();
            
            // 2. Отправляем ID на бэкенд и ждем записи в базу
            await sendAttendance(decodedText);
            
            // 3. Через 3 секунды автоматически включаем камеру обратно для следующего человека
            setTimeout(() => {
                document.getElementById('show').style.display = 'none';
                html5Qrcode.start({facingMode:"environment"}, config, qrCodeSuccessCallback);
            }, 3000);
        }
    }
    
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
    html5Qrcode.start({facingMode:"environment"}, config, qrCodeSuccessCallback);
</script>


    </body>

   

    
</body>
</html>
