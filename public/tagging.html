<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f4f6f9;
        color: #333;
      }

      /* ================= HEADER ================= */

      header {
        background: #1f3b57;
        color: white;
        padding: 18px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
      }

      header a {
        text-decoration: none;
        color: white;
      }

      header p:first-child {
        font-size: 32px;
        font-weight: bold;
        letter-spacing: 2px;
      }

      header p:last-child {
        font-size: 15px;
        color: #d9d9d9;
      }

      /* ================= PAGE ================= */

      h1 {
        text-align: center;
        margin: 35px 0;
        color: #1f3b57;
        font-size: 34px;
        letter-spacing: 1px;
      }

      .page {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-bottom: 50px;
      }

      /* ================= CARD ================= */

      .scanner-card {
        width: 560px;
        max-width: 95%;

        background: white;

        border-radius: 15px;

        padding: 30px;

        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
      }

      .scanner-card h2 {
        text-align: center;

        margin-bottom: 25px;

        color: #2e7d32;
      }

      /* ================= QR ================= */

      #reader {
        width: 100% !important;

        margin: auto;

        border-radius: 12px;

        overflow: hidden;
      }

      /* ================= RESULT ================= */

      #show {
        margin-top: 25px;

        padding: 20px;

        border-radius: 10px;

        background: #eef4ff;

        border: 1px solid #d5e3ff;
      }

      #show h4 {
        margin-bottom: 10px;

        color: #1f3b57;
      }

      #result {
        font-size: 20px;

        font-weight: bold;

        word-break: break-word;
      }

      /* ================= MOBILE ================= */

      @media (max-width: 700px) {
        header {
          flex-direction: column;

          gap: 15px;

          text-align: center;
        }

        header p:first-child {
          font-size: 28px;
        }

        h1 {
          font-size: 28px;
        }

        .scanner-card {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="./index.html"
        ><p>STRUCTUM</p>
        <p>облік персоналу</p></a
      >
    </header>

    <h1>ТАБЕЛЮВАННЯ</h1>

    <script src="./js/qrCodeScaner.js"></script>
    <div class="page">
      <div class="scanner-card">
        <h2>📷 Сканування QR-коду</h2>

        <div id="reader"></div>

        <div id="show" style="display: none">
          <h4>Результат</h4>
          <p id="result"></p>
        </div>
      </div>
    </div>
    <script>
      const html5Qrcode = new Html5Qrcode("reader");

      // Функция отправки отметки на сервер
      async function sendAttendance(userId) {
        try {
          // 🌟 АВТОМАТИЧЕСКИ ДОСТАЕМ ОБЪЕКТ БРИГАДИРА ИЗ ПАМЯТИ БРАУЗЕРА
          const currentObject = localStorage.getItem("objectName");

          // Если объект не привязан, прерываем отправку и предупреждаем пользователя
          if (!currentObject) {
            const resultElement = document.getElementById("result");
            document.getElementById("show").style.display = "block";
            resultElement.style.color = "orange";
            resultElement.textContent =
              "⚠️ Ошибка: Вы не вошли в аккаунт или за вами не закреплен объект!";
            return;
          }

          // Отправляем ID сотрудника и название объекта на бэкенд
          const response = await fetch(
            "https://structum.onrender.com/api/attendance/scan",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                userId: userId,
                objectName: currentObject, // 🌟 Объект автоматически подставился в тело запроса
              }),
            },
          );

          const data = await response.json();
          const resultElement = document.getElementById("result");
          document.getElementById("show").style.display = "block";

          if (response.ok) {
            resultElement.style.color = "green";
            resultElement.textContent = `✅ ${data.message}`;
          } else {
            resultElement.style.color = "red";
            resultElement.textContent = `⚠️ ${data.message}`;
          }
        } catch (error) {
          console.error(error);
          alert("Ошибка подключения к серверу отметок");
        }
      }

      const qrCodeSuccessCallback = async (decodedText, decodedResult) => {
        if (decodedText) {
          // 1. Временно останавливаем камеру, чтобы она не сканировала один код много раз
          await html5Qrcode.stop();

          // 2. Отправляем ID на бэкенд и ждем записи в базу
          await sendAttendance(decodedText);

          // 3. Через 3 секунды автоматически включаем камеру обратно для следующего человека
          setTimeout(() => {
            document.getElementById("show").style.display = "none";
            html5Qrcode.start(
              { facingMode: "environment" },
              config,
              qrCodeSuccessCallback,
            );
          }, 3000);
        }
      };

      const config = { fps: 10, qrbox: { width: 250, height: 250 } };
      html5Qrcode.start(
        { facingMode: "environment" },
        config,
        qrCodeSuccessCallback,
      );
    </script>
  </body>
</html>
