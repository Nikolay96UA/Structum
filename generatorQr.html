<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор QR-кода</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <a href="index.html"><p>STRUCTUM</p><p>облік персоналу</p></a>
    </header>
  <div class="generator">
      <h1 class="generator__title">Генератор QR-кода</h1>
      <div class="generator__item">
        <label for="text-url" class="generator__label">Введіть ім'я</label>
        <input type="text" id="text-url" placeholder="Введите текст" class="generator__input">
      </div>
        <div class="generator__item">
      <button type="button" class="generator__btn generator__btn--small" id="generate">Создать QR-код</button>
        </div>
      <div class="generator__qr-code">
        <canvas id="qrcode"></canvas>
      </div>
    </div>
 <script src="./node_modules/qrious/dist/qrious.js"></script>
<script src="./js/newQr.js"></script>
</body>
</html>
