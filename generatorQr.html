<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Генератор QR-коду</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .generator { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .generator__title { margin-bottom: 20px; font-size: 24px; color: #333; }
        .generator__item { margin-bottom: 15px; }
        .generator__label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .generator__input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .generator__btn { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .generator__btn:hover { background-color: #0056b3; }
        .generator__qr-code { margin-top: 20px; display: flex; justify-content: center; }
        #qrcode { border: 1px dashed #ccc; padding: 5px; background: #fff; }
    </style>
</head>
<body>

      <header>
<a href="../index.html">STRUCTUM облік персоналу</a>     </header>

    <div class="generator">
        <h1 class="generator__title">Генератор QR-кода</h1>
        
        <div class="generator__item">
            <label for="text-url" class="generator__label">Введіть ID працівника</label>
            <input type="text" id="text-url" placeholder="Вставте 24-значний ID з бази" class="generator__input">
        </div>
        
        <div class="generator__item">
            <button type="button" class="generator__btn" id="generate">Создать QR-код</button>
        </div>
        
        <div class="generator__qr-code">
            <!-- Холст для отрисовки кода библиотекой -->
            <canvas id="qrcode"></canvas>
        </div>
    </div>

    <!-- 1. СНАЧАЛА загружаем официальную библиотеку QRious из интернета -->
    <script src="https://cloudflare.com"></script>

    <!-- 2. ТОЛЬКО ПОСЛЕ НЕЁ запускаем ваш личный файл логики -->
    <script src="./js/newQr.js"></script>

</body>
</html>
