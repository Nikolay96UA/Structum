    <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Локальная БД и HTML</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        form { margin-bottom: 20px; }
        input { margin: 5px; padding: 5px; }
        button { padding: 5px 10px; cursor: pointer; }
        ul { list-style-type: square; }
    </style>
</head>
<body>

    <h2>Добавить пользователя в JSON БД</h2>
    <form id="userForm">
        <input type="text" id="userName" placeholder="Имя" required><br>
        <input type="text" id="userJob" placeholder="Посада" required><br>
        <button type="submit">Сохранить в базу</button>
    </form>

    <h2>Список пользователей из файла:</h2>
    <ul id="usersList"></ul>





<script>
    const form = document.getElementById('userForm');
    const list = document.getElementById('usersList');
    const API_URL = 'https://structum.onrender.com/api/users';

    // Функция для загрузки списка пользователей
    async function loadUsers() {
        list.innerHTML = 'Загрузка...';
        try {
            const response = await fetch(API_URL);
            const users = await response.json();
            
            list.innerHTML = ''; 
            
            users.forEach((user, index) => {
                const li = document.createElement('li');
                li.style.marginBottom = '10px'; // Немного отступа между строками

                // Создаем текстовый блок с информацией о пользователе
                const textNode = document.createTextNode(`№${index + 1} | ${user.name} (${user.job}) `);
                li.appendChild(textNode);

                // СОЗДАЕМ КНОПКУ УДАЛЕНИЯ
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Звільнений';
                deleteBtn.style.marginLeft = '10px';
                deleteBtn.style.cursor = 'pointer';

                // Навешиваем событие клика на кнопку удаления
                deleteBtn.addEventListener('click', async () => {
                    if (confirm(`Вы уверены, что хотите удалить ${user.name}?`)) {
                        await deleteUser(user._id);
                    }
                });

                li.appendChild(deleteBtn);
                list.appendChild(li);
            });
        } catch (error) {
            list.innerHTML = 'Ошибка подключения к серверу Node.js';
            console.error(error);
        }
    }

    // НОВАЯ ФУНКЦИЯ ДЛЯ УДАЛЕНИЯ СЕРВЕРОМ
    async function deleteUser(id) {
        try {
            // Отправляем DELETE запрос с ID в самом адресе ссылки
            const response = await fetch(`${API_URL}/${id}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                loadUsers(); // Перезагружаем список, чтобы увидеть изменения
            } else {
                alert('Не удалось удалить пользователя с сервера');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            alert('Произошла ошибка при попытке удаления');
        }
    }

    // Обработчик отправки формы
    form.addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const name = document.getElementById('userName').value;
        const job = document.getElementById('userJob').value;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, job })
            });

            if (response.ok) {
                form.reset(); 
                loadUsers();  
            }
        } catch (error) {
            alert('Не удалось сохранить данные.');
        }
    });

    // Загружаем пользователей сразу при открытии страницы
    loadUsers();
</script>

</body>
</html>

</body>
