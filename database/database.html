<!-- Скрытый невидимый блок, где скрипт будет тайно создавать картинку QR-кода для скачивания -->

            <!-- Кнопка скачивания табеля объекта, на котором он находится -->

<script>
    const form = document.getElementById('userForm');
    const list = document.getElementById('usersList');
   const API_URL = 'https://structum.onrender.com/api/users';
    const OBJECTS_API_URL = 'https://structum.onrender.com/api/objects'; // Роут для списка объектов

    
    let allUsers = []; 

    async function loadObjectsForFilter() {
        try {
            const response = await fetch(OBJECTS_API_URL);
            const data = await response.json();
            if (data.success && data.objects.length > 0) {
                const objectSelect = document.getElementById('searchObject');
                data.objects.forEach(objName => {
                    const option = document.createElement('option');
                    option.value = objName.toLowerCase(); 
                    option.textContent = objName;
                    objectSelect.appendChild(option);
                });
            }
        } catch (error) {
            console.error('Не вдалося завантажити об\'єкти для фільтра:', error);
        }
    }

    async function loadUsers() {
        list.innerHTML = 'Завантаження...';
        try {
            const response = await fetch(API_URL);
            allUsers = await response.json(); 
            renderUsers(allUsers); 
        } catch (error) {
            list.innerHTML = 'Помилка підключення до сервера Node.js';
            console.error(error);
        }
    }

    function renderUsers(usersToRender) {
        list.innerHTML = ''; 
        
        if (usersToRender.length === 0) {
            list.innerHTML = '<li style="color: #999; justify-content: center; background: white; padding: 12px 15px; border-radius: 4px;">Нікого не знайдено за такими критеріями</li>';
            return;
        }
        
        usersToRender.forEach((user, index) => {
            const li = document.createElement('li');

            const infoDiv = document.createElement('div');
            infoDiv.style.display = 'flex';
            infoDiv.style.alignItems = 'center';
            infoDiv.style.gap = '15px';
            infoDiv.style.flexWrap = 'wrap';

            const mainText = document.createElement('span');
            mainText.textContent = `№${index + 1} | ${user.name} (${user.job})`;
            infoDiv.appendChild(mainText);

            const locationBadge = document.createElement('span');
            locationBadge.style.fontSize = '12px';
            locationBadge.style.fontWeight = 'bold';
            locationBadge.style.padding = '4px 10px';
            locationBadge.style.borderRadius = '20px';
            
            if (user.isScannedToday) {
                locationBadge.textContent = `🟢 Сьогодні на: ${user.lastLocation}`;
                locationBadge.style.backgroundColor = '#d4edda';
                locationBadge.style.color = '#155724';
            } else {
                if (user.lastLocation === 'Немає відміток') {
                    locationBadge.textContent = '🔴 Не відмічений взагалі';
                } else {
                    locationBadge.textContent = `🔴 Сьогодні ніде (остання: ${user.lastLocation})`;
                }
                locationBadge.style.backgroundColor = '#f8d7da';
                locationBadge.style.color = '#721c24';
            }
            
            infoDiv.appendChild(locationBadge);
            li.appendChild(infoDiv);

            // КОНТЕЙНЕР ДЛЯ КНОПОК ДЕЙСТВИЙ РЯДОМ С ИМЕНЕМ
            const actionsDiv = document.createElement('div');
            actionsDiv.style.display = 'flex';
            actionsDiv.style.gap = '8px';

            // 🌟 КНОПКА ОТКРЫТИЯ КАРТОЧКИ (МОДАЛЬНОГО ОКНА)
            const cardBtn = document.createElement('button');
            cardBtn.textContent = 'Картка';
            cardBtn.style.backgroundColor = '#007bff';
            cardBtn.style.color = 'white';
            cardBtn.style.padding = '6px 12px';
            cardBtn.style.borderRadius = '4px';
            cardBtn.style.cursor = 'pointer';
            cardBtn.addEventListener('click', () => openWorkerModal(user));
            actionsDiv.appendChild(cardBtn);

            // Кнопка удаления (увольнения)
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Звільнений';
            deleteBtn.className = 'btn-delete';
            deleteBtn.style.padding = '6px 12px';
            deleteBtn.style.borderRadius = '4px';
            deleteBtn.addEventListener('click', async () => {
                if (confirm(`Ви впевнені, що хочете видалити ${user.name}?`)) {
                    await deleteUser(user._id);
                }
            });
            actionsDiv.appendChild(deleteBtn);

            li.appendChild(actionsDiv);
            list.appendChild(li);
        });
    }



// 🌟 ОБНОВЛЕННАЯ ФУНКЦИЯ КАРТОЧКИ — С ГЕНЕРАЦИЕЙ 100% УНИКАЛЬНЫХ И НАСТОЯЩИХ QR
// 🌟 АДАПТИРОВАННАЯ ФУНКЦИЯ КАРТОЧКИ С ТВОИМ ГЕНЕРАТОРОМ QRious И АВТОСКАЧИВАНИЕМ
function openWorkerModal(user) {
    document.getElementById('modalName').textContent = user.name || 'Не вказано';
    document.getElementById('modalJob').textContent = user.job || 'Не вказано';
    document.getElementById('modalLocation').textContent = user.lastLocation || 'Немає відміток';
    document.getElementById('modalPhone').textContent = user.phone || 'Немає даних';
    document.getElementById('modalEmail').textContent = user.email || 'Немає даних';

    // Настройка ссылки для скачивания Excel табеля объекта
    // 🌟 ИСПРАВЛЕННЫЙ БЛОК ФОРМИРОВАНИЯ ССЫЛКИ СКАЧИВАНИЯ ТАБЕЛЯ
    // 🌟 ТЕПЕР СТРОГО ПОВНИЙ ШЛЯХ: ДОМЕН, РОУТ ТА ПАРАМЕТР ОБ'ЄКТА
    const excelBtn = document.getElementById('modalExcelBtn');
    
    if (user.lastLocation && 
        user.lastLocation !== 'Немає відміток' && 
        user.lastLocation !== 'Не відмічений' && 
        user.lastLocation !== 'Не відмічений взагалі' &&
        !user.lastLocation.includes('Сьогодні ніде')) { 


            // ✅ Абсолютно точна адреса вашого живого API на Render:
        excelBtn.href = `https://structum.onrender.com/api/attendance/download-excel?objectName=
${encodeURIComponent(user.lastLocation)}`;
        excelBtn.style.display = 'block';
    } else {
        // Якщо об'єкт не визначено — ховаємо кнопку, щоб уникнути помилок
        excelBtn.style.display = 'none'; 
    }



    // Очищаем старые привязки событий с кнопки QR (клонируем кнопку)
    const qrBtn = document.getElementById('modalQrBtn');
    const newQrBtn = qrBtn.cloneNode(true);
    qrBtn.parentNode.replaceChild(newQrBtn, qrBtn);

    // 1. Твоя функция принудительной загрузки библиотеки QRious
    const ensureQRiousLoaded = () => {
        return new Promise((resolve, reject) => {
            if (typeof QRious !== 'undefined') {
                resolve();
                return;
            }
            console.warn("Бібліотека QRious не знайдена в HTML. Завантажуємо примусово...");
            const script = document.createElement('script');
            script.src = "https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js";
            script.onload = () => {
                console.log("Бібліотека QRious успішно імпортована!");
                resolve();
            };
            script.onerror = () => reject(new Error("Не вдалося завантажити бібліотеку QRious з сервера CDN."));
            document.head.appendChild(script);
        });
    };

    // 2. Логика генерации и мгновенного автоматического скачивания файла
    newQrBtn.addEventListener('click', async () => {
        if (!user._id) {
            alert('Помилка: У працівника відсутній ID в базі даних!');
            return;
        }

        try {
            // Проверяем/подгружаем библиотеку перед выполнением кода
            await ensureQRiousLoaded();

            // Создаем виртуальный холст (canvas) в памяти браузера для отрисовки кода
            const qrCanvas = document.createElement('canvas');
            const size = 500; // Разрешение 500x500 для идеального качества печати

            // Твой оригинальный код отрисовки QRious
            new QRious({
                element: qrCanvas,
                value: user._id.toString(), // Вшиваем 24-значный ID сотрудника
                size: size,
                level: 'H', // Высокий уровень коррекции ошибок
                background: 'white',
                foreground: 'black'
            });

            // --- БЛОК ОФОРМЛЕНИЯ ПЕРЕПУСТКИ ---
                       // --- БЛОК ОФОРМЛЕНИЯ ПЕРЕПУСТКИ (УБРАЛИ ЗЕЛЕНУЮ РАМКУ) ---
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = size;
            finalCanvas.height = size;
            const ctx = finalCanvas.getContext('2d');

            // Белый фон бланка
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, size, size);

            // 🌟 РАСШИРИЛИ QR-КОД: теперь он занимает всю ширину холста, так как рамки больше нет
            ctx.drawImage(qrCanvas, 20, 10, size - 40, size - 75);


            // Текстовая подпись ФИО сотрудника под кодом
            ctx.fillStyle = '#333333';
            ctx.font = 'bold 16px Arial'; // Сделали шрифт чуть крупнее и контрастнее
            ctx.textAlign = 'center';
            ctx.fillText(user.name || 'ПЕРЕПУСТКА', size / 2, size - 30);
            
            ctx.fillStyle = '#888888';
            ctx.font = '11px Arial';
            ctx.fillText(`ID: ${user._id.toString()}`, size / 2, size - 12);


            // Превращаем холст в скачиваемую PNG-картинку
            const imgDataUrl = finalCanvas.toDataURL('image/png');

            // Эмулируем клик для автоматического скачивания в браузер
            const downloadLink = document.createElement('a');
            downloadLink.href = imgDataUrl;
            
            const safeName = (user.name || 'worker').replace(/\s+/g, '_');
            downloadLink.download = `Перепустка_${safeName}.png`;
            
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);

                        // 🌟 ДОПОЛНИТЕЛЬНАЯ ЛОГИКА: АВТОМАТИЧЕСКАЯ ОТПРАВКА НА EMAIL СОТРУДНИКА
           
            // 🌟 ОБНОВЛЕННАЯ ЛЕГКАЯ ОТПРАВКА НА ПОЧТУ БЕЗ ТЯЖЕЛЫХ КАРТИНОК
            if (user.email && user.email.trim() !== '' && user.email !== 'Немає даних') {
                console.log(`Запуск легкой отправки на почту: ${user.email}`);
                
                fetch('https://onrender.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: user.email.trim(),
                        userName: user.name,
                        userId: user._id // 🌟 Передаем чистый ID для формирования ссылки в письме
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert(`✅ Перепустку завантажено на ПК та автоматично надіслано працівнику на пошту: ${user.email}`);
                    } else {
                        console.error('Помилка отправки:', data.message);
                    }
                })
                .catch(err => console.error('Помилка мережі:', err));
            } else {
                alert('✅ Перепустку успішно завантажено на комп\'ютер! (Email працівника не вказано)');
            }


            console.log(`QR-код для працівника "${user.name}" успішно скачано!`);

        } catch (error) {
            console.error(error);
            alert(error.message || 'Помилка генерації QR-коду.');
        }
    });

    // Открываем модальное окно на экране
    document.getElementById('workerModal').style.display = 'flex';
}


function filterUsers() {
    const nameQuery = document.getElementById('searchName').value.toLowerCase().trim();
    const jobQuery = document.getElementById('searchJob').value.toLowerCase();
    const objectQuery = document.getElementById('searchObject').value.toLowerCase();

    const filtered = allUsers.filter(user => {
        const userJob = user.job ? user.job.toLowerCase() : '';
        const userObject = user.lastLocation ? user.lastLocation.toLowerCase() : '';

        const matchesName = user.name ? user.name.toLowerCase().includes(nameQuery) : false;
        const matchesJob = jobQuery === '' ? true : userJob === jobQuery;
        const matchesObject = objectQuery === '' ? true : userObject === objectQuery;

        return matchesName && matchesJob && matchesObject;
    });

    renderUsers(filtered);
}

async function deleteUser(id) {
    try {
        const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        if (response.ok) { loadUsers(); } else { alert('Не вдалося видалити користувача'); }
    } catch (error) { console.error(error); alert('Сталась помилка'); }
}

    // 🌟 ОБНОВЛЕННЫЙ ОБРАБОТЧИК ФОРМЫ (ПЕРЕДАЕТ ТЕЛЕФОН И EMAIL)
    form.addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const name = document.getElementById('userName').value.trim();
        const job = document.getElementById('userJob').value; 
        const phone = document.getElementById('userPhone').value.trim(); // Считываем телефон
        const email = document.getElementById('userEmail').value.trim(); // Считываем email

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, job, phone, email }) // 🌟 Передаем все 4 параметра
            });
            
            if (response.ok) { 
                form.reset(); 
                loadUsers(); // Перезагружаем список
            } else {
                alert('Помилка сервера при збереженні');
            }
        } catch (error) { 
            alert('Не вдалося зберегти дані.'); 
        }
    });
